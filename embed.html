<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Migraciones Climáticas 360 - Experiencia Inmersiva</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Pannellum CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background: #09090b;
            color: white;
            overflow: hidden;
        }
        #panorama {
            width: 100%;
            height: 100vh;
            background: #000;
        }
        /* Hide Pannellum default UI for a cleaner look */
        .pnpm-container .pnpm-controls { display: none !important; }
        .pnpm-container .pnpm-load-button { display: none !important; }
        .pnpm-about-msg { display: none !important; }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #ef4444; border-radius: 10px; }

        .warming-stripe {
            flex: 1;
            height: 100%;
            transition: opacity 0.3s ease;
        }

        /* Glassmorphism utility */
        .glass {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- Dependencies -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const { motion, AnimatePresence } = FramerMotion;

        // Climate Warming Stripes Palette
        const STRIPE_COLORS = [
            '#08306b', '#08519c', '#2171b5', '#4292c6', '#6baed6', '#9ecae1', '#c6dbef', '#deebf7',
            '#f7fbff', '#fff5f0', '#fee0d2', '#fcbba1', '#fc9272', '#fb6a4a', '#ef3b2c', '#cb181d',
            '#a50f15', '#67000d'
        ];

        // Reliable CORS-compliant images from GitHub
        const MENU_PANORAMA = "https://raw.githubusercontent.com/pchen66/panolens.js/master/examples/asset/textures/equirectangular/tunnel.jpg";
        
        const SCENARIOS = [
            {
                id: "incendios",
                title: "Incendios Forestales",
                subtitle: "España y Portugal bajo el fuego",
                image: "https://raw.githubusercontent.com/pchen66/panolens.js/master/examples/asset/textures/equirectangular/mountain.jpg",
                icon: "Flame",
                color: "from-orange-600 to-red-700",
            },
            {
                id: "desertificacion",
                title: "Desertificación",
                subtitle: "La degradación de las tierras secas",
                image: "https://raw.githubusercontent.com/pchen66/panolens.js/master/examples/asset/textures/equirectangular/field.jpg",
                icon: "Sun",
                color: "from-yellow-600 to-orange-800",
            },
            {
                id: "inundaciones",
                title: "Inundaciones",
                subtitle: "El impacto de la DANA y el agua",
                image: "https://raw.githubusercontent.com/pchen66/panolens.js/master/examples/asset/textures/equirectangular/lake.jpg",
                icon: "Droplets",
                color: "from-blue-600 to-cyan-800",
            }
        ];

        // Lucide Icon Helper for React in single file
        const LucideIcon = ({ name, className, size = 24 }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (iconRef.current && lucide[name]) {
                    lucide.createIcons({
                        attrs: { 
                            class: className,
                            width: size,
                            height: size
                        },
                        nameAttr: 'data-lucide',
                        icons: { [name]: lucide[name] }
                    });
                }
            }, [name, className, size]);
            return <i data-lucide={name} ref={iconRef} className={className}></i>;
        };

        function App() {
            const [viewState, setViewState] = useState('menu');
            const [currentScenario, setCurrentScenario] = useState(null);
            const [viewer, setViewer] = useState(null);
            const [isLoading, setIsLoading] = useState(true);
            const [loadError, setLoadError] = useState(false);
            const [gyroEnabled, setGyroEnabled] = useState(false);
            const viewerRef = useRef(null);

            useEffect(() => {
                // Safety timeout to prevent infinite loading
                const timer = setTimeout(() => {
                    if (isLoading) setIsLoading(false);
                }, 7000);

                initViewer(MENU_PANORAMA, true);
                return () => clearTimeout(timer);
            }, []);

            const initViewer = (panorama, autoRotate = false) => {
                if (!window.pannellum || !viewerRef.current) {
                    setIsLoading(false);
                    return;
                }

                try {
                    if (viewer) {
                        viewer.destroy();
                    }

                    const v = window.pannellum.viewer(viewerRef.current, {
                        type: "equirectangular",
                        panorama: panorama,
                        autoLoad: true,
                        showControls: false,
                        hfov: 100,
                        pitch: 0,
                        yaw: 0,
                        mouseZoom: true,
                        friction: 0.1,
                        autoRotate: autoRotate ? -2 : 0,
                        crossOrigin: "anonymous"
                    });

                    v.on('load', () => {
                        setIsLoading(false);
                        setLoadError(false);
                    });
                    
                    v.on('error', (err) => {
                        console.error("Pannellum error:", err);
                        setIsLoading(false);
                        setLoadError(true);
                    });

                    setViewer(v);
                } catch (e) {
                    console.error("Initialization error:", e);
                    setIsLoading(false);
                }
            };

            const startScenario = (scenario) => {
                setIsLoading(true);
                setCurrentScenario(scenario);
                setViewState('viewer');
                initViewer(scenario.image, false);
            };

            const backToMenu = () => {
                setIsLoading(true);
                setViewState('menu');
                setCurrentScenario(null);
                setGyroEnabled(false);
                initViewer(MENU_PANORAMA, true);
            };

            const toggleGyro = () => {
                if (!viewer) return;
                try {
                    if (gyroEnabled) {
                        viewer.stopOrientation();
                        setGyroEnabled(false);
                    } else {
                        viewer.startOrientation();
                        setGyroEnabled(true);
                    }
                } catch (e) {
                    alert("El giroscopio requiere una conexión segura (HTTPS) y permisos del navegador.");
                }
            };

            return (
                <div className="relative w-full h-screen bg-zinc-950 overflow-hidden text-white font-sans">
                    
                    {/* 360 Viewer Container */}
                    <div ref={viewerRef} className="absolute inset-0 w-full h-full" id="panorama" />

                    {/* Main Menu Overlay */}
                    <AnimatePresence mode="wait">
                        {viewState === 'menu' && (
                            <motion.div 
                                key="menu"
                                initial={{ opacity: 0 }}
                                animate={{ opacity: 1 }}
                                exit={{ opacity: 0, scale: 1.05 }}
                                className="absolute inset-0 z-50 flex flex-col items-center justify-center p-6 bg-black/40 backdrop-blur-[1px]"
                            >
                                {/* Warming Stripes Background Pattern */}
                                <div className="absolute inset-0 flex opacity-10 pointer-events-none">
                                    {STRIPE_COLORS.map((color, i) => (
                                        <div key={i} className="warming-stripe" style={{ backgroundColor: color }} />
                                    ))}
                                </div>

                                <div className="max-w-5xl w-full relative z-10">
                                    <motion.div 
                                        initial={{ opacity: 0, y: 30 }}
                                        animate={{ opacity: 1, y: 0 }}
                                        transition={{ delay: 0.2 }}
                                        className="text-center mb-16"
                                    >
                                        <div className="inline-flex items-center gap-2 px-4 py-1.5 rounded-full bg-red-500/10 border border-red-500/20 text-red-500 text-[11px] uppercase tracking-[0.4em] font-bold mb-8">
                                            <LucideIcon name="AlertTriangle" className="w-3.5 h-3.5" /> Crisis Climática Global
                                        </div>
                                        <h1 className="text-5xl md:text-7xl font-black tracking-tighter uppercase mb-8 leading-none">
                                            Migraciones <span className="text-red-600">Climáticas</span>
                                        </h1>
                                        <p className="text-zinc-200 text-base md:text-lg leading-relaxed max-w-3xl mx-auto font-medium">
                                            En 2024, los desastres naturales provocaron el desplazamiento forzado de <span className="text-white font-bold underline decoration-red-600 decoration-2 underline-offset-8">45,8 millones de personas</span>. Explora la realidad detrás de los datos.
                                        </p>
                                    </motion.div>

                                    <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
                                        {SCENARIOS.map((s, idx) => (
                                            <motion.button
                                                key={s.id}
                                                initial={{ opacity: 0, y: 20 }}
                                                animate={{ opacity: 1, y: 0 }}
                                                transition={{ delay: 0.4 + (idx * 0.1) }}
                                                whileHover={{ y: -5 }}
                                                onClick={() => startScenario(s)}
                                                className="group relative flex flex-col items-start p-10 bg-zinc-900/80 backdrop-blur-3xl border border-white/10 rounded-[2.5rem] hover:border-red-500/50 transition-all overflow-hidden text-left"
                                            >
                                                <div className={`absolute inset-0 bg-gradient-to-br ${s.color} opacity-0 group-hover:opacity-20 transition-opacity duration-500`} />
                                                <div className="relative z-10 w-full">
                                                    <div className="w-14 h-14 rounded-2xl bg-white/10 flex items-center justify-center mb-8 border border-white/5 group-hover:scale-110 transition-transform">
                                                        <LucideIcon name={s.icon} className="w-7 h-7 text-red-500" />
                                                    </div>
                                                    <h3 className="text-2xl font-bold mb-3 group-hover:text-red-400 transition-colors">{s.title}</h3>
                                                    <p className="text-xs text-zinc-400 uppercase tracking-[0.2em] mb-8 font-semibold leading-relaxed">{s.subtitle}</p>
                                                    <div className="flex items-center gap-2 text-red-500 text-[11px] font-bold uppercase tracking-widest opacity-0 group-hover:opacity-100 transform translate-x-[-10px] group-hover:translate-x-0 transition-all">
                                                        Explorar Escenario <LucideIcon name="ChevronRight" className="w-3.5 h-3.5" />
                                                    </div>
                                                </div>
                                            </motion.button>
                                        ))}
                                    </div>
                                </div>

                                {/* Bottom Stripes Bar */}
                                <div className="absolute bottom-0 left-0 w-full h-2.5 flex opacity-90">
                                    {STRIPE_COLORS.map((color, i) => (
                                        <div key={i} className="warming-stripe" style={{ backgroundColor: color }} />
                                    ))}
                                </div>
                            </motion.div>
                        )}
                    </AnimatePresence>

                    {/* Viewer HUD */}
                    <AnimatePresence>
                        {viewState === 'viewer' && (
                            <motion.div 
                                key="viewer-hud"
                                initial={{ opacity: 0 }}
                                animate={{ opacity: 1 }}
                                exit={{ opacity: 0 }}
                                className="absolute inset-0 pointer-events-none"
                            >
                                {/* Top Stripes HUD */}
                                <div className="absolute top-0 left-0 w-full h-1.5 flex z-50 opacity-70">
                                    {STRIPE_COLORS.map((color, i) => (
                                        <div key={i} className="warming-stripe" style={{ backgroundColor: color }} />
                                    ))}
                                </div>

                                {/* Reticle */}
                                <div className="absolute inset-0 flex items-center justify-center pointer-events-none z-30">
                                    <div className="relative">
                                        <div className="w-8 h-8 border border-white/20 rounded-full" />
                                        <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-1.5 h-1.5 bg-red-600 rounded-full shadow-[0_0_15px_#dc2626]" />
                                    </div>
                                </div>

                                {/* Controls */}
                                <div className="absolute top-0 left-0 w-full p-8 pt-10 flex justify-between items-start z-40">
                                    <div className="flex gap-4 pointer-events-auto">
                                        <button 
                                            onClick={backToMenu}
                                            className="p-5 rounded-2xl glass text-white hover:bg-white/20 transition-all flex items-center gap-3 group"
                                        >
                                            <LucideIcon name="ArrowLeft" className="w-5 h-5 group-hover:-translate-x-1 transition-transform" />
                                            <span className="text-[11px] font-bold uppercase tracking-widest hidden md:block">Menú Principal</span>
                                        </button>
                                        
                                        <div className="glass p-5 rounded-2xl flex items-center gap-4">
                                            <div className="w-2 h-2 bg-red-600 rounded-full animate-pulse" />
                                            <h2 className="text-sm font-bold tracking-widest uppercase text-white">
                                                {currentScenario?.title}
                                            </h2>
                                        </div>
                                    </div>

                                    <div className="flex flex-col gap-4 items-end pointer-events-auto">
                                        <button 
                                            onClick={toggleGyro}
                                            title="Activar Giroscopio"
                                            className={`p-5 rounded-2xl transition-all border shadow-2xl ${gyroEnabled ? 'bg-red-600 border-red-500 scale-110' : 'glass border-white/10'}`}
                                        >
                                            <LucideIcon name="Smartphone" className="w-6 h-6" />
                                        </button>
                                        <button 
                                            onClick={() => document.documentElement.requestFullscreen()}
                                            className="p-5 rounded-2xl glass border-white/10 text-white hover:bg-white/10 transition-all"
                                        >
                                            <LucideIcon name="Maximize2" className="w-6 h-6" />
                                        </button>
                                    </div>
                                </div>

                                {/* Footer Info */}
                                <div className="absolute bottom-10 left-1/2 -translate-x-1/2 z-40 w-full px-8 flex justify-center">
                                    <div className="glass px-10 py-5 rounded-full flex items-center gap-8 text-[11px] uppercase tracking-[0.25em] opacity-95 pointer-events-auto shadow-2xl">
                                        <span className="flex items-center gap-3 font-bold">
                                            <LucideIcon name="MousePointer2" className="w-4 h-4 text-red-600" /> 
                                            Arrastra para explorar el entorno
                                        </span>
                                        <div className="w-px h-4 bg-white/20" />
                                        <span className="text-zinc-400">Información integrada en la imagen</span>
                                    </div>
                                </div>
                            </motion.div>
                        )}
                    </AnimatePresence>

                    {/* Thematic Loading Screen */}
                    <AnimatePresence>
                        {isLoading && (
                            <motion.div 
                                initial={{ opacity: 1 }}
                                exit={{ opacity: 0 }}
                                transition={{ duration: 0.8 }}
                                className="absolute inset-0 z-[100] flex flex-col items-center justify-center bg-zinc-950"
                            >
                                <motion.div 
                                    animate={{ scale: [1, 1.1, 1], opacity: [0.5, 1, 0.5] }}
                                    transition={{ duration: 2, repeat: Infinity }}
                                    className="relative mb-12"
                                >
                                    <LucideIcon name="Loader2" className="w-20 h-20 animate-spin text-red-600" />
                                </motion.div>
                                
                                <h2 className="text-3xl font-black tracking-[0.4em] uppercase text-white mb-4">Cargando</h2>
                                
                                <div className="w-64 h-1.5 flex rounded-full overflow-hidden bg-white/10 mb-6">
                                    {STRIPE_COLORS.map((color, i) => (
                                        <motion.div 
                                            key={i} 
                                            className="flex-1 h-full" 
                                            style={{ backgroundColor: color }}
                                            animate={{ opacity: [0.2, 1, 0.2] }}
                                            transition={{ duration: 1.5, repeat: Infinity, delay: i * 0.08 }}
                                        />
                                    ))}
                                </div>
                                
                                <p className="text-zinc-500 text-[10px] uppercase tracking-[0.3em] font-bold">
                                    {loadError ? "Error de conexión - Cargando interfaz básica" : "Sincronizando datos climáticos 360°"}
                                </p>
                            </motion.div>
                        )}
                    </AnimatePresence>
                </div>
            );
        }

        // Render the App
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
